plugins {
    id 'java'
    id 'application'
}

group = 'com.notionbot'
version = '1.0-SNAPSHOT'

repositories {
    mavenCentral()
}

dependencies {
    // Discord API
    implementation 'net.dv8tion:JDA:5.0.0-beta.20'
    
    // Notion SDK
    implementation 'com.github.seratch:notion-sdk-jvm-core:1.10.0'
    
    // Gemini / Google AI (Using direct HTTP for now as it's often more flexible, but adding SDK for reference)
    implementation 'com.google.cloud:google-cloud-aiplatform:3.43.0'
    
    // Utilities
    implementation 'io.github.cdimascio:dotenv-java:3.0.0'
    implementation 'com.github.ben-manes.caffeine:caffeine:3.1.8'
    implementation 'com.fasterxml.jackson.core:jackson-databind:2.15.2'
    
    // Logging
    implementation 'ch.qos.logback:logback-classic:1.4.11'
    implementation 'org.slf4j:slf4j-api:2.0.7'

    testImplementation platform('org.junit:junit-bom:5.10.0')
    testImplementation 'org.junit.jupiter:junit-jupiter'
}

application {
    mainClass = 'com.notionbot.Main'
}

tasks.withType(JavaCompile) {
    options.encoding = 'UTF-8'
    sourceCompatibility = '17'
    targetCompatibility = '17'
}

test {
    useJUnitPlatform()
}
